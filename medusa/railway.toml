[build]
builder = "NIXPACKS"
buildCommand = "yarn install"

[deploy]
preDeployCommand = "NODE_OPTIONS=--max-old-space-size=4096 yarn build && yarn medusa db:migrate && yarn medusa exec ./src/scripts/create-admin.ts"
startCommand = "yarn start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
